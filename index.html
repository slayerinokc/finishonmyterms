<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finish On My Terms</title>
<meta name="description" content="A channel for people over 50 who are done waiting on somebody else's clock. Building income with AI, on my own timeline.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #06090F;
    --blue:       #0070FF;
    --cyan:       #00C8FF;
    --text:       #E2E8F4;
    --text-2:     #7B8FAB;
    --text-3:     #3D4F68;
    --border:     rgba(0, 140, 255, 0.12);
    --glow-blue:  0 0 60px rgba(0, 112, 255, 0.25);
    --grad:       linear-gradient(135deg, #0070FF 0%, #00C8FF 100%);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg) url('bg.png') center center / cover no-repeat fixed;
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* Dark overlay to improve text contrast */
  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(6, 9, 15, 0.82) 0%,
      rgba(6, 9, 15, 0.65) 50%,
      rgba(6, 9, 15, 0.15) 100%
    );
    z-index: 0;
  }

  .stage {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 6vh 8vw;
    text-align: left;
  }

  .glow {
    position: absolute;
    top: 40%;
    left: 30%;
    width: 60vw;
    height: 60vw;
    max-width: 700px;
    max-height: 700px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle,
      rgba(0, 112, 255, 0.10) 0%,
      rgba(0, 200, 255, 0.05) 40%,
      transparent 70%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 24px;
  }

  h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(2.6rem, 7.5vw, 5rem);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
    text-shadow: var(--glow-blue);
    margin: 0;
  }

  h1 span {
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .lede {
    font-size: clamp(1.02rem, 2.1vw, 1.2rem);
    line-height: 1.7;
    color: var(--text-2);
    max-width: 48ch;
    margin: 0;
  }
  .lede b {
    color: var(--cyan);
    font-weight: 600;
  }

  .actions {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 18px;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.98rem;
    color: #fff;
    background: var(--grad);
    padding: 14px 28px;
    border-radius: 8px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 0 0 rgba(0, 112, 255, 0);
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0, 112, 255, 0.40), 0 0 20px rgba(0, 200, 255, 0.20);
  }
  .btn:focus-visible { outline: 2px solid var(--cyan); outline-offset: 3px; }
  .btn svg { width: 16px; height: 16px; }

  footer {
    position: relative;
    z-index: 1;
    padding: 22px 8vw 28px;
    text-align: left;
    font-size: 0.8rem;
    color: var(--text-3);
  }

  @media (max-width: 640px) {
    .stage { align-items: center; text-align: center; }
    .content { align-items: center; }
    .actions { justify-content: center; }
    footer { text-align: center; }
  }
</style>
</head>
<body>

  <main class="stage">
    <div class="glow" aria-hidden="true"></div>

    <div class="content">
      <h1>Finish On <span>My Terms</span></h1>

      <p class="lede">
        A channel for people over 50 who are done waiting on somebody else's clock.
        I'm using <b>AI</b> to build income and skip the parts of the old plan that don't work anymore.
      </p>

      <div class="actions">
        <a class="btn" href="https://www.youtube.com/@FinishOnMyTerms?sub_confirmation=1" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21.6 7.2c-.25-1.03-1.02-1.84-2-2.1C17.9 4.6 12 4.6 12 4.6s-5.9 0-7.6.5c-.98.26-1.75 1.07-2 2.1C2 9 2 12 2 12s0 3 .4 4.8c.25 1.03 1.02 1.8 2 2.06 1.7.54 7.6.54 7.6.54s5.9 0 7.6-.54c.98-.26 1.75-1.03 2-2.06.4-1.8.4-4.8.4-4.8s0-3-.4-4.8ZM10 15.2V8.8L15.8 12 10 15.2Z"/></svg>
          Watch on YouTube
        </a>
      </div>
    </div>
  </main>

  <footer>
    &copy; <span id="y"></span> Finish On My Terms
  </footer>

  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
